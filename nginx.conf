server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        if (-f /etc/letsencrypt/live/$host/fullchain.pem) {
            return 301 https://$host$request_uri;
        }
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # ============ GEO-IP BLOCK (Vietnam only) ============
    # Cloudflare sends CF-IPCountry header with country code
    # Block non-Vietnam IPs with custom page
    set $geo_block 0;
    if ($http_cf_ipcountry !~* "^(VN|)$") {
        set $geo_block 1;
    }

    # Serve blocked page for non-Vietnam
    location = /blocked.html {
        # Accessible as error page
    }

    error_page 403 /blocked.html;

    # ============ SUPABASE PROXY ============
    # All proxy endpoints require X-App-Request header
    # Direct browser access will be blocked with 403

    # REST API proxy
    location /supaapi/ {
        # Block direct browser access
        if ($http_x_app_request = '') {
            return 403 '{"error":"Forbidden"}';
        }
        proxy_pass ${SUPABASE_URL}/rest/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_set_header Authorization "Bearer ${SUPABASE_ANON_KEY}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Auth API proxy (fetch calls)
    location /supaauth/ {
        if ($http_x_app_request = '') {
            return 403 '{"error":"Forbidden"}';
        }
        proxy_pass ${SUPABASE_URL}/auth/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Auth API proxy (browser redirects - Google OAuth)
    location /auth/v1/ {
        proxy_pass ${SUPABASE_URL}/auth/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Realtime (WebSocket) proxy
    location /suparealtime/ {
        proxy_pass ${SUPABASE_URL}/realtime/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
    }

    # Storage proxy
    location /supastorage/ {
        if ($http_x_app_request = '') {
            return 403 '{"error":"Forbidden"}';
        }
        proxy_pass ${SUPABASE_URL}/storage/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_ssl_server_name on;
    }

    # Edge Functions proxy
    location /supafunc/ {
        if ($http_x_app_request = '') {
            return 403 '{"error":"Forbidden"}';
        }
        proxy_pass ${SUPABASE_URL}/functions/v1/;
        proxy_set_header Host ${SUPABASE_HOST};
        proxy_set_header apikey ${SUPABASE_ANON_KEY};
        proxy_set_header Authorization "Bearer ${SUPABASE_ANON_KEY}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # ============ END PROXY ============

    location / {
        if ($geo_block = 1) {
            return 403;
        }
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
